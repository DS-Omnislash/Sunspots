
data:
  url: "https://www.sidc.be/silso/DATA/SN_d_tot_V2.0.csv"
  save_path: "data/raw/sunspots.csv"
  processed_path: "data/processed/sunspots_features.csv"
  solar_flux_url: "https://www.ngdc.noaa.gov/stp/space-weather/solar-data/solar-features/solar-radio/noontime-flux/penticton/penticton_adjusted/listings/listing_drao_noontime-flux-adjusted_daily.txt"
  solar_flux_path: "data/raw/solar_flux.csv"

features:
  lags: [1, 2, 3, 4, 5, 7, 30, 365, 4015]
  rolling_windows: [7, 30, 365, 4015]
  target_shift: -5  # 5 days ahead? The code used -5
  max_lag_resid: 20

model:
  ridge_alpha: 1.0
  resid_model_type: lgb
  xgb_params:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 7
    objective: 'reg:pseudohubererror'
  lgb_params:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    verbosity: -1
    n_jobs: -1
  evt:
    upper_q: 80
    lower_q: 20

evaluation:
  initial_train_size: 4015 # 11 years * 365
  val_size: 5
  step_size: 90
